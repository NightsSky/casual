name: Release

# 打 tag（形如 v0.2.0）时触发：构建 Android APK 与 Windows 桌面版，
# 上传到对应的 GitHub Release，供应用内更新检测与下载。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/casual-${{ steps.version.outputs.version }}.apk"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/casual-${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: true

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "dist/casual-windows-$version.zip" -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/casual-windows-${{ steps.version.outputs.version }}.zip
          fail_on_unmatched_files: true
